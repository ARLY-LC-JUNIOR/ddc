name: Update Profile cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate hexagon stats card
        continue-on-error: true
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          shell: bash
          command: |
            curl -sf -L -o assets/hexagon-stats.svg "https://stats.hyo.dev/api/github-stats?login=${{ github.repository_owner }}"
            sed -i 's/#26272D/#000/g; s/stroke:url(#backgroundInnerLineGradient)/stroke:none/g; s/#FFFFFF/#7fff00/g; s/Designed by hyochan//' assets/hexagon-stats.svg
            
      - name: Generate streak stats card
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          shell: bash
          command: |
            mkdir -p profile
            if [ ! -d /tmp/streak-stats ]; then
              git clone --depth 1 https://github.com/DenverCoder1/github-readme-streak-stats.git /tmp/streak-stats
            fi
            docker build -t streak-stats /tmp/streak-stats
            docker rm -f streak 2>/dev/null || true
            docker run -d --name streak -p 8080:80 -e TOKEN=${{ secrets.GITHUB_TOKEN }} streak-stats
            for i in $(seq 1 30); do
              curl -s -o /dev/null http://localhost:8080/ && break
              sleep 1
            done
            curl -sf -o assets/streak.svg "http://localhost:8080/?user=${{ github.repository_owner }}&theme=chartreuse-dark&hide_border=true&mode=weekly&card_width=800&card_height=200"
            docker stop streak
            docker rm streak

      - name: Generate readme stats cards
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          shell: bash
          command: |
            if [ ! -d /tmp/github-readme-stats ]; then
              git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/github-readme-stats
            fi
            (cd /tmp/github-readme-stats && npm install --ignore-scripts)
            PAT_1=${{ secrets.GH_PAT }} node /tmp/github-readme-stats/express.js &
            for i in $(seq 1 30); do
              curl -s -o /dev/null http://localhost:9000/api && break
              sleep 1
            done

            OWNER="${{ github.repository_owner }}"
            THEME="chartreuse-dark"
            BASE="http://localhost:9000"

            fetch() {
              local output="$1" url="$2"
              echo "Fetching $(basename "$output")..."
              if curl -f --retry 3 --retry-delay 2 --retry-all-errors --max-time 60 -o "$output" "$url"; then
                echo "  OK: $(basename "$output")"
              else
                echo "  FAILED: $(basename "$output") (exit code $?)"
              fi
            }

            fetch assets/stats.svg "${BASE}/api?username=${OWNER}&show_icons=true&theme=${THEME}&hide_border=true&card_width=800&include_all_commits=true&count_private=true"
            fetch assets/top-langs.svg "${BASE}/api/top-langs?username=${OWNER}&theme=${THEME}&hide_border=true&card_width=800&layout=normal&langs_count=10"
            fetch assets/wakatime.svg "${BASE}/api/wakatime?username=${OWNER}&theme=${THEME}&hide_border=true&card_width=800&card_height=1000"
            fetch assets/raspfan.svg "${BASE}/api/gist?id=1c2d19f1c932de07f26dc1f02e0ee3ec&theme=${THEME}&hide_border=true"

            declare -A PINS=(
              ["802_11ad"]="802.11ad"
              ["ddcDatabases"]="ddcDatabases"
              ["DiscordBot"]="DiscordBot"
              ["Gw2Launcher"]="Gw2Launcher"
              ["jetbrains_theme"]="JetbrainsTheme"
              ["jetbrains_traffic_light_buttons"]="JetbrainsTrafficLightButtons"
              ["macos_tahoe_kde_theme"]="macOsTahoeKdeTheme"
              ["post_install_os"]="post-install-os"
              ["pythonLogs"]="pythonLogs"
              ["ReshadeUtils"]="ReshadeUtils"
            )
            for file in "${!PINS[@]}"; do
              repo="${PINS[$file]}"
              fetch "assets/${file}.svg" "${BASE}/api/pin?username=${OWNER}&repo=${repo}&theme=${THEME}&hide_border=true"
            done

            kill %1 2>/dev/null || true

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase
          git stash pop
          git add assets/*.svg
          git commit -m "Update README cards" || exit 0
          git push
